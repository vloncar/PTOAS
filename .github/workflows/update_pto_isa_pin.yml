name: Update pto-isa pin

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-pto-isa-pin:
    if: github.repository == 'zhangstevenunity/PTOAS'
    runs-on: ubuntu-22.04
    env:
      AUTOMATION_TOKEN: ${{ secrets.WORKFLOW_BOT_TOKEN || secrets.RELEASE_BOT_TOKEN || '' }}
    steps:
      - name: Validate automation token
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUTOMATION_TOKEN}" ]; then
            echo "ERROR: missing WORKFLOW_BOT_TOKEN or RELEASE_BOT_TOKEN secret"
            echo "This workflow updates .github/workflows/ci.yml, so it must use a bot token with workflow-file write access."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ env.AUTOMATION_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update pinned pto-isa commit
        id: update
        shell: bash
        run: |
          set -euo pipefail
          sha="$(python .github/scripts/update_pto_isa_pin.py)"
          python .github/scripts/update_pto_isa_pin.py --commit "${sha}" --check
          echo "pto_isa_commit=${sha}" >> "${GITHUB_OUTPUT}"
          echo "pto_isa_short=${sha:0:12}" >> "${GITHUB_OUTPUT}"

      - name: Create draft pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ env.AUTOMATION_TOKEN }}
          base: main
          branch: automation/weekly-pto-isa-pin
          delete-branch: true
          draft: true
          title: "chore(ci): bump pto-isa pin to ${{ steps.update.outputs.pto_isa_short }}"
          commit-message: "chore(ci): bump pto-isa pin to ${{ steps.update.outputs.pto_isa_short }}"
          body: |
            Weekly update of the pinned `pto-isa` commit used by CI and the Docker image.

            - repo: `https://gitcode.com/cann/pto-isa.git`
            - commit: `${{ steps.update.outputs.pto_isa_commit }}`
